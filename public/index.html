<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multiplayer Blackjack</title>
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <h1>🃏 Multiplayer Blackjack</h1>
  <div class="section" id="joinScreen">
    <h2>Join Game</h2>
    <input id="nameInput" placeholder="Enter your name" />
    <button onclick="joinGame()">Join</button>
  </div>
  
  <div class="section" id="lobby">
    <button onclick="startGame()">Start Game</button>
    <br>Players:
    <ul id="lobbyList">
      
    </ul>
  </div>
  
  <section id="game">
    <div id="turnTimer"></div>
    <div id="dealer"></div>
    <div id="players"></div>

    <div id="controls">
      <!-- Betting controls -->
      <div class="section" id="betControls">
        <h2>Place Bet</h2>
        <input id="betInput" type="number" placeholder="Bet amount" />
        <button onclick="placeBet()">Place Bet</button>
      </div>

      <!-- Action controls -->
      <div class="section" id="actionControls">
        <h2>Your Turn</h2>
        <button onclick="hit()" id="hitBtn">Hit</button>
        <button onclick="stand()" id="standBtn">Stand</button>
      </div>
    </div>

    <div id="roundResults"></div>
  </section>
</body>
</html>

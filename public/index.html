<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multiplayer Blackjack</title>
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <h1>🃏 Multiplayer Blackjack</h1>

  <div class="section" id="joinScreen">
    <h2>Join Game</h2>
    <input id="nameInput" placeholder="Enter your name" />
    <button onclick="joinGame()">Join</button>
  </div>

  <div class="section" id="lobby">
    <button onclick="startGame()">Start Game</button>
    <br>Players:
    <ul id="lobbyList">

    </ul>
  </div>

  <section id="game">
    <div id="dealerCards"></div>
  <div id="playersArea"></div>

  <div id="controls">
    <div id="betControls">
      <input id="betAmount" type="number" />
      <button onclick="placeBet()">Place Bet</button>
    </div>

    <div id="actionControls" style="display:none;">
      <button onclick="hit()">Hit</button>
      <button onclick="stand()">Stand</button>
    </div>
  </div>

  <div id="roundResults"></div>
  </section>
</body>
</html>
